name: Bug Report
description: Report a bug in agent-eval-harness
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Thanks for filing a bug report. Please fill out the sections below."
  - type: input
    id: version
    attributes:
      label: Version
      description: "Output of `agent-eval version`"
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      description: "Output of `python --version`"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: "What happened?"
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: "Minimal code or commands to reproduce the bug"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: "What did you expect to happen?"
  - type: textarea
    id: traceback
    attributes:
      label: Error traceback
      description: "Paste the full traceback if applicable"
      render: python
